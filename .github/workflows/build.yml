name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libdb-dev libsqlite3-dev uuid-dev libffi-dev liblzma-dev
          pip install --upgrade pip
          pip install "cython<3.0.0" wheel setuptools buildozer
          
      - name: Initialize Buildozer and Edit Spec
        run: |
          buildozer init
          # Прописываем все настройки, включая стабильную версию приложения
          sed -i 's/requirements = python3, kivy/requirements = python3, kivy==2.2.0, networkx/g' buildozer.spec
          sed -i 's/#android.api = 31/android.api = 33/g' buildozer.spec
          sed -i 's/android.api = 31/android.api = 33/g' buildozer.spec
          sed -i 's/#android.archs = armeabi-v7a/android.archs = arm64-v8a/g' buildozer.spec
          sed -i 's/#android.num_cores =.*/android.num_cores = 1/g' buildozer.spec
          sed -i 's/version.regex =.*/version.fixed = 1.0.0/g' buildozer.spec
          
      - name: Build with Buildozer
        run: |
          export BUILDOZER_NUM_CORES=1
          yes | buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: metro-app-apk
          path: bin/*.apk

