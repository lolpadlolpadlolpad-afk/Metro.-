name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 11 (For Stable Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libdb-dev libsqlite3-dev uuid-dev libffi-dev liblzma-dev
          pip install --upgrade pip
          pip install buildozer cython setuptools
          
      - name: Initialize Buildozer and Edit Spec
        run: |
          buildozer init
          sed -i 's/requirements = python3, kivy/requirements = python3, kivy, networkx/g' buildozer.spec
          sed -i 's/#android.api = 31/android.api = 34/g' buildozer.spec
          sed -i 's/android.api = 31/android.api = 34/g' buildozer.spec
          sed -i 's/#android.archs = armeabi-v7a/android.archs = arm64-v8a/g' buildozer.spec
          
      - name: Build with Buildozer
        run: |
          yes | buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: metro-app-apk
          path: bin/*.apk
